# Draft / publish GitHub Release → TestFlight (iOS) + Play internal testing (Android).
# Trigger: release published only (no tag push / branch push uploads).

name: Mobile release (TestFlight + Play internal)

on:
  release:
    types: [published]

concurrency:
  group: mobile-release-${{ github.event.release.tag_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack (Yarn 4)
        run: corepack enable

      - name: Install JS dependencies
        run: yarn install

      - name: Lint + typecheck
        run: |
          yarn mobile:lint
          yarn mobile:typecheck

      - name: Validate release tag and version
        id: meta
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [[ ! "${TAG_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must be vMAJOR.MINOR.PATCH (example: v1.4.0). Got: ${TAG_NAME}"
            exit 1
          fi
          APP_VERSION="${TAG_NAME#v}"
          echo "app_version=${APP_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Save release notes for TestFlight
        env:
          BODY: ${{ github.event.release.body }}
        run: |
          mkdir -p release-notes
          printf '%s\n' "${BODY}" > release-notes/release_notes.txt

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-notes
          path: release-notes/release_notes.txt
          if-no-files-found: error
          retention-days: 5

  ios_upload_testflight:
    name: iOS TestFlight
    needs: preflight
    runs-on: macos-14
    environment: mobile-release
    env:
      APP_VERSION: ${{ needs.preflight.outputs.app_version }}
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: mobile-release-notes
          path: release-notes

      - name: Copy release notes for TestFlight changelog
        run: |
          mkdir -p apps/mobile/fastlane/tmp
          cp release-notes/release_notes.txt apps/mobile/fastlane/tmp/release_notes.txt

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install JS dependencies
        run: yarn install

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: |
          set -euo pipefail
          mkdir -p "${HOME}/private_keys"
          KEY_PATH="${HOME}/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s\n' "${APP_STORE_CONNECT_KEY_P8}" > "${KEY_PATH}"
          echo "APP_STORE_CONNECT_KEY_FILEPATH=${KEY_PATH}" >> "${GITHUB_ENV}"

      - name: Run fastlane (iOS)
        working-directory: apps/mobile
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          TESTFLIGHT_CHANGELOG_PATH: ${{ github.workspace }}/apps/mobile/fastlane/tmp/release_notes.txt
        run: bundle exec fastlane ios upload_testflight

      - name: Upload fastlane + gym logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-fastlane-logs
          path: |
            apps/mobile/fastlane/logs
          if-no-files-found: ignore
          retention-days: 14

  android_internal:
    name: Android Play internal
    needs: preflight
    runs-on: ubuntu-latest
    environment: mobile-release
    env:
      APP_VERSION: ${{ needs.preflight.outputs.app_version }}
      BUILD_NUMBER: ${{ github.run_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install JS dependencies
        run: yarn install

      - name: Restore google-services.json
        env:
          JSON_BODY: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: printf '%s' "${JSON_BODY}" > apps/mobile/android/app/google-services.json

      - name: Restore Play upload keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_UPLOAD_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "${KEYSTORE_B64}" | base64 -d > apps/mobile/android/upload-keystore

      - name: Write release-keystore.properties
        env:
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          cat > apps/mobile/android/release-keystore.properties <<EOF
          storeFile=upload-keystore
          storePassword=${STORE_PASSWORD}
          keyAlias=${KEY_ALIAS}
          keyPassword=${KEY_PASSWORD}
          EOF

      - name: Write Play service account JSON
        id: play_json
        env:
          PLAY_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          printf '%s' "${PLAY_JSON}" > "${RUNNER_TEMP}/play-service-account.json"
          echo "json_path=${RUNNER_TEMP}/play-service-account.json" >> "${GITHUB_OUTPUT}"

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: apps/mobile

      - name: Run fastlane (Android)
        working-directory: apps/mobile
        env:
          GOOGLE_PLAY_JSON_KEY_PATH: ${{ steps.play_json.outputs.json_path }}
        run: bundle exec fastlane android internal

      - name: Upload AAB artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: android-app-release-aab
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: warn
          retention-days: 14

      - name: Upload Gradle log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: android-gradle-failure
          path: apps/mobile/android/app/build/outputs
          if-no-files-found: ignore
          retention-days: 7
