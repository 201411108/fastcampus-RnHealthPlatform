buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        classpath("com.google.gms:google-services:4.4.4")
    }
}

apply plugin: "com.facebook.react.rootproject"

// @react-native-async-storage/async-storage v3 ships shared_storage AAR only in package local_repo (not Maven Central).
def asyncStorageLocalMaven = "$rootDir/../../../node_modules/@react-native-async-storage/async-storage/android/local_repo"

subprojects { sub ->
    sub.repositories {
        maven {
            url(uri(asyncStorageLocalMaven))
        }
    }
    // Lint PrivateApiDetector가 CI에서 Metaspace OOM까지 유발할 수 있음 (@shopify/react-native-skia)
    if (sub.path.contains("react-native-skia")) {
        sub.pluginManager.withPlugin("com.android.library") {
            def androidExtension = sub.extensions.findByName("android")
            if (androidExtension == null) {
                return
            }
            androidExtension.lint {
                disable("BlockedPrivateApi", "DiscouragedPrivateApi", "PrivateApi", "SoonBlockedPrivateApi")
            }
        }
        sub.pluginManager.withPlugin("com.android.application") {
            def androidExtension = sub.extensions.findByName("android")
            if (androidExtension == null) {
                return
            }
            androidExtension.lint {
                disable("BlockedPrivateApi", "DiscouragedPrivateApi", "PrivateApi", "SoonBlockedPrivateApi")
            }
        }
    }
}
apply plugin: "expo-root-project"
